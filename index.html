




<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sheane, půjdeš se mnou na rande? ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    overflow:hidden;
    background:linear-gradient(135deg,#ffb6d9,#ffd6e8,#ffe7f2);
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
    position:relative;
}

.card{
    background:rgba(255,255,255,.92);
    backdrop-filter:blur(10px);
    padding:40px 30px;
    border-radius:30px;
    box-shadow:0 15px 40px rgba(0,0,0,.15);
    max-width:700px;
    width:100%;
    position:relative;
    z-index:10;
}

h1,h2{
    color:#ff3d7f;
    margin-bottom:20px;
}

p{
    margin-bottom:20px;
    color:#444;
}

.btn{
    padding:15px 35px;
    border:none;
    border-radius:999px;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
    margin:10px;
    font-weight:600;
}

.yes{
    background:#ff3d7f;
    color:white;
}

.yes:hover{
    transform:scale(1.08);
}

.no{
    background:#666;
    color:white;
    position:fixed;
    z-index:999;
}

input,
select{
    width:100%;
    padding:14px;
    margin:12px 0;
    border-radius:14px;
    border:1px solid #ddd;
    font-size:16px;
}

.hidden{
    display:none;
}

.finish{
    font-size:28px;
    font-weight:bold;
    color:#ff3d7f;
    line-height:1.6;
}

.music-note{
    position:fixed;
    right:15px;
    bottom:15px;
    background:white;
    padding:10px 15px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
    z-index:20;
}

.ribbon,
.heart{
    position:fixed;
    pointer-events:none;
    animation:fall linear forwards;
    z-index:1;
}

@keyframes fall{
    from{
        transform:translateY(-120px) rotate(0deg);
        opacity:1;
    }

    to{
        transform:translateY(110vh) rotate(360deg);
        opacity:0;
    }
}

@media(max-width:600px){

    .card{
        padding:30px 20px;
    }

    .btn{
        width:100%;
        margin:8px 0;
    }

    .finish{
        font-size:22px;
    }
}

</style>
</head>

<body>

<div class="card">

    <!-- STEP 1 -->
    <div id="step1">

        <h1>💖 Sheane, půjdeš se mnou na rande? 💖</h1>

        <p>Jsi pro mě výjimečný člověk. ❤️</p>

        <button class="btn yes" onclick="showStep2()">
            ANO ❤️
        </button>

        <button class="btn no" id="noBtn">
            NE 😢
        </button>

    </div>

    <!-- STEP 2 -->
    <div id="step2" class="hidden">

        <h2>📅 Kdy půjdeme na rande?</h2>

        <input type="date" id="date">

        <select id="time">
            <option value="">Vyber čas</option>
            <option>08:00</option>
            <option>09:00</option>
            <option>10:00</option>
            <option>11:00</option>
            <option>12:00</option>
            <option>13:00</option>
            <option>14:00</option>
            <option>15:00</option>
            <option>16:00</option>
            <option>17:00</option>
            <option>18:00</option>
            <option>19:00</option>
            <option>20:00</option>
            <option>21:00</option>
        </select>

        <button class="btn yes" onclick="showStep3()">
            Pokračovat ❤️
        </button>

    </div>

    <!-- STEP 3 -->
    <div id="step3" class="hidden">

        <h2>🍕 Jaké je tvoje oblíbené jídlo?</h2>

        <select id="food">
            <option>Pizza</option>
            <option>Burger</option>
            <option>Sushi</option>
            <option>Těstoviny</option>
            <option>Steak</option>
            <option>Salát</option>
        </select>

        <button class="btn yes" onclick="finishLove()">
            Odeslat ❤️
        </button>

    </div>

    <!-- STEP 4 -->
    <div id="step4" class="hidden">

        <div class="finish">
            ❤️ Užijeme si společné rande ❤️
            <br><br>
            🥰 Miluju tě, lásko má 🥰
        </div>

    </div>

</div>

<div class="music-note">
    🎵 Romantická hudba
</div>

<script>

const noBtn = document.getElementById("noBtn");

/* Pohyb tlačítka NE */
function moveNoButton(){

    const maxX = window.innerWidth - noBtn.offsetWidth - 20;
    const maxY = window.innerHeight - noBtn.offsetHeight - 20;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}

noBtn.addEventListener("mouseover", moveNoButton);
noBtn.addEventListener("click", moveNoButton);

/* Nastavení minimálního data */
const today = new Date().toISOString().split("T")[0];
document.getElementById("date").min = today;

/* Přechod STEP 1 -> STEP 2 */
function showStep2(){

    document.getElementById("step1").classList.add("hidden");
    document.getElementById("step2").classList.remove("hidden");
}

/* Přechod STEP 2 -> STEP 3 */
function showStep3(){

    const date = document.getElementById("date").value;
    const time = document.getElementById("time").value;

    if(!date || !time){

        alert("Prosím vyber datum a čas ❤️");
        return;
    }

    document.getElementById("step2").classList.add("hidden");
    document.getElementById("step3").classList.remove("hidden");
}

/* Dokončení */
function finishLove(){

    const date = document.getElementById("date").value;
    const time = document.getElementById("time").value;
    const food = document.getElementById("food").value;

    console.log("Rande:");
    console.log("Datum:", date);
    console.log("Čas:", time);
    console.log("Jídlo:", food);

    /*
    EmailJS zde:
    
    emailjs.send(
        "service_xxxxx",
        "template_xxxxx",
        {
            date: date,
            time: time,
            food: food
        }
    );
    */

    document.getElementById("step3").classList.add("hidden");
    document.getElementById("step4").classList.remove("hidden");
}

/* Srdíčka */
function createHeart(){

    const heart = document.createElement("div");

    heart.className = "heart";
    heart.innerHTML = "❤️";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (15 + Math.random() * 25) + "px";
    heart.style.animationDuration = (4 + Math.random() * 5) + "s";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 9000);
}

/* Mašličky */
function createRibbon(){

    const ribbon = document.createElement("div");

    ribbon.className = "ribbon";
    ribbon.innerHTML = "🎀";

    ribbon.style.left = Math.random() * 100 + "vw";
    ribbon.style.fontSize = (15 + Math.random() * 25) + "px";
    ribbon.style.animationDuration = (5 + Math.random() * 6) + "s";

    document.body.appendChild(ribbon);

    setTimeout(() => {
        ribbon.remove();
    }, 10000);
}

setInterval(createHeart, 400);
setInterval(createRibbon, 800);

</script>

<!--
Hudba:

<audio autoplay loop>
    <source src="romanticka.mp3" type="audio/mpeg">
</audio>
-->

</body>
</html>
